<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ana Paula & Benjamim</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Great+Vibes&family=Cedarville+Cursive&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="fotos/A&B.png">
    <link rel="icon" type="image/png" sizes="192x192" href="fotos/A&B.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ana & Benjamim">

    <style>
        :root {
            --boho-bg: #F9F1E7;    
            --boho-burgundy: #801818; 
            --boho-caqui: #C1A36F;   
            --boho-marrom: #5C3D2E;  
            --boho-marrom-light: #8B7163;
            --card-white: #FFFFFF;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--boho-bg);
            color: var(--boho-marrom);
            margin: 0;
            padding: 80px 20px 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* === SPLASH SCREEN === */
        .splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--boho-bg);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }
        .splash-screen.hidden { opacity: 0; visibility: hidden; }
        .splash-content { text-align: center; padding: 0 30px; animation: scaleIn 1s ease-out; }
        .splash-versiculo { font-family: 'Cedarville Cursive', cursive; font-size: 1.2rem; color: var(--boho-marrom-light); margin-bottom: 40px; }
        .loader-container { width: 200px; height: 4px; background: rgba(193, 163, 111, 0.2); border-radius: 2px; margin: 0 auto 15px auto; overflow: hidden; }
        .loader-bar { width: 0; height: 100%; background: var(--boho-burgundy); animation: fillLoader 3s forwards ease-in-out; }
        @keyframes fillLoader { to { width: 100%; } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* === MENU LATERAL === */
        .menu-burger { position: fixed; top: 25px; left: 20px; font-size: 1.8rem; color: var(--boho-burgundy); z-index: 1001; cursor: pointer; }
        .side-menu { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; left: 0; background-color: var(--boho-bg); overflow-x: hidden; transition: 0.5s; padding-top: 60px; box-shadow: 2px 0 15px rgba(0,0,0,0.1); }
        .side-menu a { padding: 15px 32px; text-decoration: none; font-size: 1.1rem; color: var(--boho-marrom); display: block; font-weight: 700; border-bottom: 1px solid rgba(193,163,111,0.1); }
        .menu-header { padding: 0 32px 20px 32px; font-family: 'Great Vibes', cursive; font-size: 2.5rem; color: var(--boho-burgundy); }
        .close-btn { position: absolute; top: 10px; right: 25px; font-size: 2.5rem; color: var(--boho-burgundy); cursor: pointer; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1500; }

        /* === CONTEÚDO === */
        header { text-align: center; margin-bottom: 50px; }
        h2 { font-family: 'Great Vibes', cursive; font-size: 3rem; color: var(--boho-burgundy); margin: 0; }
        .versiculo-header { font-family: 'Cedarville Cursive', cursive; font-size: 0.9rem; color: var(--boho-marrom-light); display: block; margin: 10px 0; }
        #contador { font-size: 2.2rem; color: var(--boho-burgundy); font-weight: 700; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.6s ease; }
        
        /* Grid de Categorias */
        .grid-categorias { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card-categoria { background: var(--card-white); padding: 30px 10px; border-radius: 20px; text-align: center; border: 1px solid var(--boho-caqui); }
        
        /* Cards dos Vales */
        .card { background: var(--card-white); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(193,163,111,0.15); }
        .card.done { opacity: 0.5; filter: grayscale(1); }
        .badge { font-size: 0.6rem; background: var(--boho-caqui); color: white; padding: 4px 10px; border-radius: 5px; text-transform: uppercase; }
        .btn-resgatar { background: var(--boho-burgundy); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 700; margin-top: 10px; }
        .btn-voltar { background: none; border: 1px solid var(--boho-caqui); color: var(--boho-caqui); padding: 8px 15px; border-radius: 10px; margin-bottom: 20px; font-weight: 700; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <p class="splash-versiculo">"Para que todos vejam... que a mão do Senhor fez isto"</p>
            <div class="loader-container"><div class="loader-bar"></div></div>
            <p style="font-size: 0.7rem; color: var(--boho-caqui); letter-spacing: 2px;">CARREGANDO NOSSO AMOR</p>
        </div>
    </div>

    <div class="menu-burger" onclick="toggleMenu()">☰</div>
    <div id="side-menu" class="side-menu">
        <div class="close-btn" onclick="toggleMenu()">×</div>
        <div class="menu-header">Menu</div>
        <a href="#" onclick="irParaInicio()">🎟️ Meus Vales</a>
        <a href="#" onclick="showTab('fotos')">📸 Galeria de Fotos</a>
        <a href="#" onclick="showTab('trilha')">🎵 Nossa Trilha</a>
    </div>
    <div id="overlay" onclick="toggleMenu()"></div>

    <header>
        <h2>Ana & Benjamim</h2>
        <span class="versiculo-header">"A mão do Senhor fez isto"</span>
        <div id="contador">000 DIAS</div>
        <p style="font-size: 0.7rem; color: var(--boho-caqui); text-transform: uppercase;">Desde o nosso primeiro sim</p>
    </header>

    <div id="vales" class="section active">
        <div id="lista-vales"></div>
    </div>

    <div id="fotos" class="section">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <img src="fotos/foto1.jpg" style="width:100%; border-radius:15px;">
            <img src="fotos/foto2.jpg" style="width:100%; border-radius:15px;">
            </div>
    </div>

    <div id="trilha" class="section">
        <iframe allow="autoplay" frameborder="0" height="450" style="width:100%; border-radius:20px;" src="https://embed.music.apple.com/br/playlist/a-b/pl.u-JPAZbdJulR8D6jZ"></iframe>
    </div>

    <script>
        const valesData = [
            { titulo: "Vale um jantar romântico cozinhado por mim 🍷", cat: "Casal" },
            { titulo: "Vale uma massagem relaxante 💆‍♂️", cat: "Casal" },
            { titulo: "Vale-GP em Casa: Assistir corrida inteira juntos 🏁", cat: "F1" },
            { titulo: "Vale-Final de Campeonato: Petiscos para o jogo ⚽", cat: "Futebol" },
            { titulo: "Vale-Mansão Maromba: Um treino junto 💪", cat: "Shape" },
            { titulo: "Vale-Em Pleno 2026: Lição de moral 🗣️", cat: "Toguro" },
            // ... adicione todos os outros aqui seguindo esse padrão
        ];

        let progresso = JSON.parse(localStorage.getItem('vales_1ano')) || {};

        // Splash Screen Logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('hidden');
            }, 3500);
        });

        // Menu Logic
        function toggleMenu() {
            const menu = document.getElementById("side-menu");
            const overlay = document.getElementById("overlay");
            const isOpen = menu.style.width === "280px";
            menu.style.width = isOpen ? "0" : "280px";
            overlay.style.display = isOpen ? "none" : "block";
        }

        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'vales') renderCategorias();
            toggleMenu();
            window.scrollTo(0,0);
        }

        function irParaInicio() {
            showTab('vales');
        }

        // Vales & Categories Logic
        function renderCategorias() {
            const container = document.getElementById('lista-vales');
            const categorias = [...new Set(valesData.map(v => v.cat))];
            container.innerHTML = `<div class="grid-categorias">
                ${categorias.map(cat => `
                    <div class="card-categoria" onclick="filtrarVales('${cat}')">
                        <div style="font-size: 2rem">${getEmoji(cat)}</div>
                        <h4>${cat}</h4>
                    </div>
                `).join('')}
            </div>`;
        }

        function filtrarVales(categoria) {
            const container = document.getElementById('lista-vales');
            const filtrados = valesData.map((v, i) => ({...v, id: i})).filter(v => v.cat === categoria);
            
            container.innerHTML = `
                <button class="btn-voltar" onclick="renderCategorias()">← Voltar</button>
                ${filtrados.map(v => `
                    <div class="card ${progresso[v.id] ? 'done' : ''}">
                        <span class="badge">${v.cat}</span>
                        <h3>${v.titulo}</h3>
                        ${!progresso[v.id] ? `<button class="btn-resgatar" onclick="resgatar(${v.id}, '${v.cat}')">RESGATAR</button>` : '<span>✓ RESGATADO</span>'}
                    </div>
                `).join('')}`;
        }

        function getEmoji(cat) {
            const emojis = { "Casal": "❤️", "F1": "🏎️", "Futebol": "⚽", "Shape": "💪", "Toguro": "⚖️" };
            return emojis[cat] || "🎟️";
        }

        window.resgatar = (i, cat) => {
            if(confirm("Confirmar resgate?")) {
                progresso[i] = true;
                localStorage.setItem('vales_1ano', JSON.stringify(progresso));
                filtrarVales(cat);
            }
        };

        // Contador
        const dataInicio = new Date("2025-03-29T00:00:00");
        function atualizarContador() {
            const dias = Math.floor((new Date() - dataInicio) / (1000 * 60 * 60 * 24));
            document.getElementById('contador').innerText = dias + " DIAS";
        }

        setInterval(atualizarContador, 1000);
        atualizarContador();
        renderCategorias();
    </script>
</body>
</html>
