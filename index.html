<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ana Paula & Benjamim </title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Importando Great Vibes (Assinatura do Título) */
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
        
        /* Importando Cedarville Cursive (Manuscrita do Versículo) */
        @import url('https://fonts.googleapis.com/css2?family=Cedarville+Cursive&display=swap');

        :root {
            /* Paleta Bohemian Expandida */
            --boho-bg: #F9F1E7;    /* Bege Claro */
            --boho-burgundy: #801818; /* Burgundy (Vinho) */
            --boho-caqui: #C1A36F;   /* Caqui (Dourado terroso) */
            --boho-marrom: #5C3D2E;  /* Marrom escuro */
            --boho-marrom-light: #8B7163; /* Marrom mais claro para o versículo */
            --card-white: #FFFFFF;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--boho-bg);
            color: var(--boho-marrom);
            margin: 0;
            padding: 40px 20px 140px 20px;
            -webkit-font-smoothing: antialiased;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            padding: 0 10px;
        }

        /* TÍTULO PRINCIPAL: Ana Paula & Benjamim (Fonte Assinatura) */
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.8rem;
            font-weight: 400;
            margin: 0 0 5px 0;
            color: var(--boho-burgundy);
            letter-spacing: -1px;
        }

        /* VERSÍCULO: Fonte Manuscrita (Cedarville Cursive) */
        .versiculo {
            font-family: 'Cedarville Cursive', cursive;
            font-size: 1.1rem; /* Tamanho ideal para legibilidade */
            color: var(--boho-marrom-light); /* Cor mais suave */
            line-height: 1.6;
            margin: 0 0 25px 0;
            padding: 0 15px;
            display: inline-block;
        }

        /* CONTADOR COMO SUBTÍTULO */
        #contador {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem; /* Tamanho de subtítulo */
            color: var(--boho-burgundy);
            font-weight: 700;
            display: block;
            margin: 0 0 5px 0;
            letter-spacing: -1px;
        }

        header p {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            color: var(--boho-caqui);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        /* Seções e Cards (Visual Bohemian mantido) */
        .card {
            background: var(--card-white);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(92, 61, 46, 0.08);
            border: 1px solid rgba(193, 163, 111, 0.15);
        }

        .badge {
            font-size: 0.65rem;
            font-weight: 700;
            color: white;
            background: var(--boho-caqui);
            padding: 5px 12px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .card h3 {
            font-size: 1.1rem;
            margin: 0 0 18px 0;
            line-height: 1.4;
            font-weight: 700;
            color: var(--boho-marrom);
        }

        .btn-resgatar {
            font-family: 'Montserrat', sans-serif;
            background: var(--boho-burgundy);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            width: 100%;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(128, 24, 24, 0.15);
        }

        .card.done { opacity: 0.5; filter: sepia(0.3); }

        /* Menu Inferior Estilo iOS */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(249, 241, 231, 0.96);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0 45px 0;
            border-top: 1px solid rgba(193, 163, 111, 0.2);
            z-index: 1000;
        }

        .nav-item {
            font-family: 'Montserrat', sans-serif;
            border: none; background: none;
            color: var(--boho-marrom);
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
        }

        .nav-item.active { 
            color: var(--boho-burgundy); 
            opacity: 1;
        }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h1>Ana Paula & Benjamim</h1>
        
        <span class="versiculo">
            "Para que todos vejam, e saibam, e considerem, e juntamente entendam que a mão do Senhor fez isto"
        </span>

        <div id="contador">000 DIAS</div>
        <p>Desde o nosso primeiro sim</p>
    </header>

    <div id="vales" class="section active">
        <div id="lista-vales"></div>
    </div>

    <div id="fotos" class="section">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <img src="img/foto1.jpg" style="width:100%; border-radius:15px;" alt="Nós">
            <img src="img/foto2.jpg" style="width:100%; border-radius:15px;" alt="Nós">
        </div>
    </div>

    <div id="trilha" class="section">
        <iframe allow="autoplay *; encrypted-media *; fullscreen *;" frameborder="0" height="450" style="width:100%; overflow:hidden; border-radius:20px; box-shadow: 0 8px 25px rgba(92, 61, 46, 0.15);" src="https://embed.music.apple.com/br/playlist/a-b/pl.u-JPAZbdJulR8D6jZ?l=en"></iframe>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="showTab('vales', this)">🎟️ Vales</button>
        <button class="nav-item" onclick="showTab('fotos', this)">📸 Fotos</button>
        <button class="nav-item" onclick="showTab('trilha', this)">🎵 Músicas</button>
    </nav>

    <script>
        // Use a lista de 83 vales enviada anteriormente aqui
        const valesData = [
            { titulo: "Vale um jantar romântico cozinhado por mim 🍷", cat: "Especial" },
            { titulo: "Vale uma massagem capilar com cafuné 💆‍♂️", cat: "Relax" }
        ];

        let progresso = JSON.parse(localStorage.getItem('vales_1ano')) || {};

        function renderVales() {
            const container = document.getElementById('lista-vales');
            container.innerHTML = valesData.map((vale, i) => `
                <div class="card ${progresso[i] ? 'done' : ''}">
                    <span class="badge">${vale.cat}</span>
                    <h3>${vale.titulo}</h3>
                    ${!progresso[i] 
                        ? `<button class="btn-resgatar" onclick="resgatar(${i})">RESGATAR</button>` 
                        : '<span style="font-weight:700; color:var(--boho-caqui)">✓ RESGATADO</span>'}
                </div>
            `).join('');
        }

        window.resgatar = (i) => {
            if(confirm("Deseja usar este vale?")) {
                progresso[i] = true;
                localStorage.setItem('vales_1ano', JSON.stringify(progresso));
                renderVales();
            }
        };

        window.showTab = (id, btn) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            window.scrollTo(0,0);
        }

        const dataInicio = new Date("2025-03-29T00:00:00");
        function atualizarContador() {
            const dias = Math.floor((new Date() - dataInicio) / (1000 * 60 * 60 * 24));
            document.getElementById('contador').innerText = dias + " DIAS";
        }
        setInterval(atualizarContador, 1000);
        atualizarContador();
        renderVales();
    </script>
</body>
</html>
