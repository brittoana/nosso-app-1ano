<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>1 Ano de Nós ❤️</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-bege: #F5F5DC; /* Bege Champagne para contraste */
            --card-white: #FFFFFF;
            --primary-red: #E60000; /* Vermelho F1 */
            --text-dark: #1C1C1E;
            --text-muted: #8E8E93;
            --f1-color: #e60000;
            --futebol-color: #28a745;
            --shape-color: #333333;
            --casal-color: #d1d1d1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-bege);
            color: var(--text-dark);
            margin: 0;
            padding: 40px 20px 140px 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* Cabeçalho de Destaque */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
            color: var(--text-dark);
        }

        #contador {
            font-size: 3.5rem; /* Fonte do Timer aumentada */
            color: var(--primary-red);
            font-weight: 900;
            display: block;
            margin: 10px 0;
            letter-spacing: -2px;
        }

        header p {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Seções */
        .section { display: none; }
        .section.active { display: block; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards de Vales com Design Refinado */
        .card {
            background: var(--card-white);
            border-radius: 22px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0,0,0,0.03);
            position: relative;
            transition: transform 0.2s;
        }

        .card.casal { border-left: 6px solid var(--casal-color); }
        .card.f1 { border-left: 6px solid var(--f1-color); }
        .card.futebol { border-left: 6px solid var(--futebol-color); }
        .card.shape { border-left: 6px solid var(--shape-color); }
        .card.toguro { border-left: 6px solid #6c757d; }

        .badge {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-muted);
            background: #F2F2F7;
            padding: 4px 10px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 12px;
        }

        .card h3 {
            font-size: 1.1rem;
            margin: 0 0 18px 0;
            line-height: 1.4;
            font-weight: 700;
        }

        .btn-resgatar {
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.9rem;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(230, 0, 0, 0.2);
        }

        .card.done { opacity: 0.5; filter: grayscale(1); }

        /* Galeria de Fotos Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 18px;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Player Apple Music */
        .player-container {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            background: white;
        }

        /* Barra de Navegação estilo iOS */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0 40px 0;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .nav-item {
            border: none; background: none;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-item.active { color: var(--primary-red); }
    </style>
</head>
<body>

    <div id="trilha" class="section">
        <div class="player-container">
            <iframe allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write" frameborder="0" height="450" style="width:100%;max-width:660px;overflow:hidden;border-radius:10px;" sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation" src="https://embed.music.apple.com/br/playlist/a-b/pl.u-JPAZbdJulR8D6jZ?l=en"></iframe>
        </div>
    </div>

    <nav class="bottom-nav">

            { titulo: "Vale-Vale Tudo: Repetir qualquer uma das opções anteriores 🔄", cat: "casal" }

        let progresso = JSON.parse(localStorage.getItem('vales_1ano')) || {};

        function renderVales() {
            const container = document.getElementById('lista-vales');
            if (!container) return;
            container.innerHTML = valesData.map((vale, i) => `
                <div class="card ${vale.cat} ${progresso[i] ? 'done' : ''}">
                    <span class="badge">${vale.cat}</span>
                    <h3>${vale.titulo}</h3>
                    ${!progresso[i] 
                        ? `<button class="btn-resgatar" onclick="resgatar(${i})">RESGATAR</button>` 
                        : '<span style="font-weight:bold; color:var(--text-muted)">✅ Resgatado</span>'}
                </div>
            `).join('');
        }

        window.resgatar = (i) => {
            if(confirm("Deseja resgatar este vale?")) {
                progresso[i] = true;
                localStorage.setItem('vales_1ano', JSON.stringify(progresso));
                renderVales();
            }
        };

        window.showTab = (id, btn) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            window.scrollTo(0,0);
        }

        const dataInicio = new Date("2025-03-29T00:00:00");
        function atualizarContador() {
            const dias = Math.floor((new Date() - dataInicio) / (1000 * 60 * 60 * 24));
            document.getElementById('contador').innerText = dias + " dias";
        }
        
        setInterval(atualizarContador, 1000);
        atualizarContador();
        renderVales();
    </script>

</html>
