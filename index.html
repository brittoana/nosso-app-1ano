    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Great+Vibes&family=Cedarville+Cursive&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --boho-bg: #F9F1E7;    
            --boho-burgundy: #801818; 
            --boho-caqui: #C1A36F;   
            --boho-marrom: #5C3D2E;  
            --boho-marrom-light: #8B7163;
            --card-white: #FFFFFF;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--boho-bg);
            color: var(--boho-marrom);
            margin: 0;
            padding: 40px 20px 140px 20px;
            -webkit-font-smoothing: antialiased;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            font-weight: 400;
            margin: 0;
            color: var(--boho-burgundy);
        }

        .versiculo {
            font-family: 'Cedarville Cursive', cursive;
            font-size: 1.1rem;
            color: var(--boho-marrom-light);
            line-height: 1.6;
            margin: 15px 0 25px 0;
            display: inline-block;
            padding: 0 10px;
        }

        #contador {
            font-size: 2.5rem;
            color: var(--boho-burgundy);
            font-weight: 700;
            margin-bottom: 5px;
        }

        header p {
            font-size: 0.75rem;
            color: var(--boho-caqui);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.6s ease; }

        .card {
            background: var(--card-white);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(92, 61, 46, 0.08);
            border: 1px solid rgba(193, 163, 111, 0.15);
        }

        .badge {
            font-size: 0.65rem;
            font-weight: 700;
            color: white;
            background: var(--boho-caqui);
            padding: 5px 12px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .card h3 {
            font-size: 1.1rem;
            margin: 0 0 18px 0;
            line-height: 1.4;
            color: var(--boho-marrom);
            font-weight: 700;
        }

        .btn-resgatar {
            background: var(--boho-burgundy);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
        }

        .card.done { opacity: 0.5; filter: sepia(0.3); }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(249, 241, 231, 0.96);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0 45px 0;
            border-top: 1px solid rgba(193, 163, 111, 0.2);
            z-index: 1000;
        }

        .nav-item {
            border: none; background: none;
            color: var(--boho-marrom);
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.5;
            cursor: pointer;
        }

        .nav-item.active { color: var(--boho-burgundy); opacity: 1; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

        let progresso = JSON.parse(localStorage.getItem('vales_1ano')) || {};

        function renderVales() {
            const container = document.getElementById('lista-vales');
            container.innerHTML = valesData.map((vale, i) => `
                <div class="card ${progresso[i] ? 'done' : ''}">
                    <span class="badge">${vale.cat}</span>
                    <h3>${vale.titulo}</h3>
                    ${!progresso[i] 
                        ? `<button class="btn-resgatar" onclick="resgatar(${i})">RESGATAR</button>` 
                        : '<span style="font-weight:700; color:var(--boho-caqui)">✓ RESGATADO</span>'}
                </div>
            `).join('');
        }

        window.resgatar = (i) => {
            if(confirm("Confirmar resgate?")) {
                progresso[i] = true;
                localStorage.setItem('vales_1ano', JSON.stringify(progresso));
                renderVales();
            }
        };

        window.showTab = (id, btn) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            window.scrollTo(0,0);
        }

        const dataInicio = new Date("2025-03-29T00:00:00");
        function atualizarContador() {
            const dias = Math.floor((new Date() - dataInicio) / (1000 * 60 * 60 * 24));
            document.getElementById('contador').innerText = dias + " DIAS";
        }
        setInterval(atualizarContador, 1000);
        atualizarContador();
        renderVales();
